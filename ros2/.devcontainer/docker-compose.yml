services:
  gello-ros2:
    build:
      context: .
      # Choose versions of libfranka, franka_ros2 and franka_description
      # Note: The versions need to be set according to your robot's system version
      # https://franka.de/fr3-compatibility-matrix
      args:
        LIBFRANKA_VERSION: ${LIBFRANKA_VERSION:-0.18.0}
        FRANKA_ROS2_VERSION: ${FRANKA_ROS2_VERSION:-v2.1.0}
        FRANKA_DESCRIPTION_VERSION: ${FRANKA_DESCRIPTION_VERSION:-1.3.0}
    privileged: true
    restart: no
    network_mode: host
    init: true # Ensure signal forwarding to child processes
    stop_signal: SIGINT # ros2 launch needs SIGINT to shutdown gracefully
    volumes:
      - ../../:/workspace
      - /dev/serial/by-id:/dev/serial/by-id
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSH: "1"
      XAUTHORITY: /tmp/.docker.xauth
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
